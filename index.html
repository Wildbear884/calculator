<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Calculator</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="calc-container">
      <div class="calc-display">45645</div>
      <button class="calc-btn-seven">7</button>
      <button class="calc-btn-eight">8</button>
      <button class="calc-btn-nine">9</button>
      <button class="calc-btn-divide">/</button>
      <button class="calc-btn-four">4</button>
      <button class="calc-btn-five">5</button>
      <button class="calc-btn-six">6</button>
      <button class="calc-btn-multiply">*</button>
      <button class="calc-btn-one">1</button>
      <button class="calc-btn-two">2</button>
      <button class="calc-btn-three">3</button>
      <button class="calc-btn-minus">-</button>
      <button class="calc-btn-zero">0</button>
      <button class="calc-btn-decimal">.</button>
      <button class="calc-btn-backspace">Back</button>
      <button class="calc-btn-add">+</button>
      <button class="calc-btn-clear">Clear</button>
      <button class="calc-btn-equal">=</button>
    </div>
  </body>
</html>
